<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>過渡熱抵抗 3Dシミュレーター (2D断面 & CSV出力版)</title>
<!-- Tailwind CSS (スタイリング用) -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- React & ReactDOM -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<!-- Babel (ブラウザ内でJSXをコンパイルするため) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Prop-types & Recharts (グラフ描画用) -->
<script src="https://unpkg.com/prop-types@15.7.2/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
<!-- Three.js & OrbitControls (3D描画用) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
  body, html { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: sans-serif; }
  #root { height: 100%; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// --- ライブラリの読み込み ---
const { useState, useEffect, useCallback, useMemo, useRef } = React;
const { LineChart, Line, ScatterChart, Scatter, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ZAxis } = window.Recharts;

// --- SVGアイコン ---
const IconBase = ({ children, className }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
    {children}
  </svg>
);
const Layers = ({ className }) => <IconBase className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></IconBase>;
const Play = ({ className }) => <IconBase className={className}><polygon points="5 3 19 12 5 21 5 3"/></IconBase>;
const Trash2 = ({ className }) => <IconBase className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>;
const Target = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></IconBase>;
const Network = ({ className }) => <IconBase className={className}><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></IconBase>;
const BoxIcon = ({ className }) => <IconBase className={className}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></IconBase>;
const LayoutTemplate = ({ className }) => <IconBase className={className}><rect x="3" y="3" width="18" height="7" rx="2" ry="2"/><rect x="3" y="14" width="7" height="7" rx="2" ry="2"/><rect x="14" y="14" width="7" height="7" rx="2" ry="2"/></IconBase>;
const Maximize = ({ className }) => <IconBase className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></IconBase>;
const Cpu = ({ className }) => <IconBase className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></IconBase>;
const Download = ({ className }) => <IconBase className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>;

// --- 材料データベース ---
// lambda: 熱伝導率[W/mK]、rho:密度[g/mm3]、c:比熱[J/kg・K]
const materialDB = {
  "SiC": { name: "SiC", lambda: 270, rho: 3210, c: 680 },
  "Si": { name: "Si", lambda: 149, rho: 2330, c: 710 },
  "Solder_PF358": { name: "Solder(PF358)", lambda: 55.6, rho: 7300, c: 258 },
  "Solder_Sn5Sb": { name: "Solder(PbSn)", lambda: 48.1, rho: 8400, c: 150 },
  "Cu": { name: "Cu", lambda: 398, rho: 8960, c: 385 },
  "Al(A3003)": { name: "Al", lambda: 193, rho: 2700, c: 904 },
  "AlN": { name: "AlN", lambda: 170, rho: 3260, c: 740 },
  "Si3N4": { name: "Si3N4", lambda: 80, rho: 3300, c: 680 },
  "TIM": { name: "Grease", lambda: 3.0, rho: 2500, c: 1000 },
  "Resin": { name: "Resin-insulation", lambda: 17, rho: 1883, c: 880 }
};

// --- 3Dビューア ---
const ThreeViewer = ({ config, computedLayers, layers }) => {
  const mountRef = useRef(null);

  useEffect(() => {
    if (!mountRef.current || !window.THREE) return;
    const THREE = window.THREE;
    const width = mountRef.current.clientWidth;
    const height = mountRef.current.clientHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf8fafc);

    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    mountRef.current.innerHTML = '';
    mountRef.current.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
    dirLight.position.set(20, 50, 20);
    scene.add(dirLight);

    const createFrustum = (wTop, dTop, wBot, dBot, h, yPos, color, opacity) => {
      const geom = new THREE.BoxGeometry(1, 1, 1);
      const pos = geom.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const vx = pos.getX(i);
        const vy = pos.getY(i);
        const vz = pos.getZ(i);
        const cw = vy > 0 ? wTop : wBot;
        const cd = vy > 0 ? dTop : dBot;
        pos.setXYZ(i, Math.sign(vx) * cw/2, vy * h, Math.sign(vz) * cd/2);
      }
      geom.computeVertexNormals();
      const mat = new THREE.MeshPhongMaterial({ color, transparent: true, opacity, side: THREE.DoubleSide, depthWrite: false });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.y = yPos;
      return mesh;
    };

    let currentZ = 0;
    layers.forEach((layer) => {
      const t = Number(layer.thickness) || 0;
      if (t <= 0) return;

      let lw = Math.max(config.baseX * 1.5, 60);
      let ld = Math.max(config.baseY * 1.5, 60);
      if (layer.boundary === 'substrate') { lw = config.subX; ld = config.subY; }
      else if (layer.boundary === 'base') { lw = config.baseX; ld = config.baseY; }

      const layerGeom = new THREE.BoxGeometry(lw, t, ld);
      const mat = new THREE.MeshPhongMaterial({ color: layer.color || 0x94a3b8, transparent: true, opacity: 0.1 });
      const mesh = new THREE.Mesh(layerGeom, mat);
      mesh.position.y = - (currentZ + t / 2);
      scene.add(mesh);

      const edges = new THREE.LineSegments(new THREE.EdgesGeometry(layerGeom), new THREE.LineBasicMaterial({ color: layer.color || 0x94a3b8, opacity: 0.4 }));
      edges.position.y = - (currentZ + t / 2);
      scene.add(edges);

      currentZ += t;
    });

    const totalDepth = currentZ;
    const cx = (config.nx - 1) * config.px / 2;
    const cz = (config.ny - 1) * config.py / 2;

    for (let i = 0; i < config.nx; i++) {
      for (let j = 0; j < config.ny; j++) {
        const xOff = i * config.px - cx;
        const zOff = j * config.py - cz;
        const chipMesh = new THREE.Mesh(new THREE.BoxGeometry(config.w, 0.4, config.d), new THREE.MeshPhongMaterial({ color: 0xef4444 }));
        chipMesh.position.set(xOff, 0.2, zOff);
        scene.add(chipMesh);
      }
    }

    let currentZForSpread = 0;
    computedLayers.forEach((layer) => {
      if (layer.isChip) return;
      const t = Number(layer.thickness) || 0;
      if (t <= 0) return;
      
      const frustum = createFrustum(layer.w_in, layer.d_in, layer.w_out, layer.d_out, t, -(currentZForSpread + t/2), 0xf59e0b, 0.3);
      scene.add(frustum);
      currentZForSpread += t;
    });

    const maxViewSize = Math.max(config.baseX, config.baseY, 50);
    camera.position.set(maxViewSize * 0.8, totalDepth * 2 + maxViewSize * 0.5, maxViewSize * 0.8);
    controls.target.set(0, -totalDepth/2, 0);
    controls.update();

    let reqId;
    const animate = () => {
      reqId = requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    };
    animate();

    const handleResize = () => {
      if(mountRef.current) {
        camera.aspect = mountRef.current.clientWidth / mountRef.current.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(mountRef.current.clientWidth, mountRef.current.clientHeight);
      }
    };
    window.addEventListener('resize', handleResize);

    return () => {
      cancelAnimationFrame(reqId);
      window.removeEventListener('resize', handleResize);
      renderer.dispose();
    };
  }, [config, computedLayers, layers]);

  return <div ref={mountRef} className="w-full h-full cursor-move" />;
};

// --- 2D断面図 (SVG) ---
const CrossSectionView = ({ config, computedLayers, layers }) => {
  const totalThickness = computedLayers.reduce((acc, l) => acc + (l.isChip ? 0 : l.thickness), 0);
  const maxW = Math.max(config.baseX, config.subX, config.w * config.nx * 2);
  
  // SVG座標系設定
  const svgHeight = 300;
  const svgWidth = 200;
  const margin = { top: 20, bottom: 20, left: 10, right: 10 };
  const effectiveH = svgHeight - margin.top - margin.bottom;
  
  // スケール計算 (アスペクト比は維持せず、見やすく引き伸ばす)
  const scaleY = effectiveH / (totalThickness || 1);
  const scaleX = (svgWidth - margin.left - margin.right) / maxW;
  const cx = svgWidth / 2;
  
  let currentY = margin.top;

  return (
    <div className="w-full h-full flex flex-col items-center bg-slate-50 relative">
      <div className="absolute top-2 left-2 text-xs font-bold text-slate-500 bg-white/80 px-2 py-1 rounded">2D断面 (熱拡散イメージ)</div>
      <svg width="100%" height="100%" viewBox={`0 0 ${svgWidth} ${svgHeight}`} preserveAspectRatio="xMidYMid meet">
        {/* 背景グリッド */}
        <defs>
          <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
            <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#e2e8f0" strokeWidth="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />
        
        {/* チップ描画 */}
        <g>
          <rect
            x={cx - (config.w * config.nx * scaleX)/2}
            y={currentY - 5}
            width={config.w * config.nx * scaleX}
            height={5}
            fill="#ef4444"
          />
          <text x={cx} y={currentY - 8} textAnchor="middle" fontSize="10" fill="#ef4444" fontWeight="bold">Chip</text>
        </g>
        
        {/* 各層の描画 */}
        {computedLayers.map((layer, idx) => {
          if (layer.isChip) return null;
          
          const h = layer.thickness * scaleY;
          const y = currentY;
          
          // 物理的な境界（基板サイズなど）
          let boundW = maxW;
          if (layer.boundary === 'substrate') boundW = config.subX;
          if (layer.boundary === 'base') boundW = config.baseX;
          
          // 有効熱伝導エリア (台形)
          const x1_in = cx - (layer.w_in * scaleX) / 2;
          const x2_in = cx + (layer.w_in * scaleX) / 2;
          const x1_out = cx - (layer.w_out * scaleX) / 2;
          const x2_out = cx + (layer.w_out * scaleX) / 2;
          
          const points = `${x1_in},${y} ${x2_in},${y} ${x2_out},${y+h} ${x1_out},${y+h}`;
          
          const elem = (
            <g key={idx}>
              {/* 物理境界ボックス */}
              <rect
                x={cx - (boundW * scaleX) / 2}
                y={y}
                width={boundW * scaleX}
                height={h}
                fill="none"
                stroke="#cbd5e1"
                strokeWidth="1"
                strokeDasharray="2 2"
              />
              {/* 熱拡散台形 */}
              <polygon points={points} fill={layer.color || "#cbd5e1"} opacity="0.6" stroke={layer.color} />
              
              {/* ラベル */}
              <text x={10} y={y + h/2 + 3} fontSize="8" fill="#64748b">{layer.name}</text>
              <text x={svgWidth - 10} y={y + h/2 + 3} textAnchor="end" fontSize="8" fill="#64748b">{layer.thickness}mm</text>
            </g>
          );
          currentY += h;
          return elem;
        })}
        {/* 中心線 */}
        <line x1={cx} y1={0} x2={cx} y2={svgHeight} stroke="#94a3b8" strokeWidth="0.5" strokeDasharray="4 2" />
      </svg>
    </div>
  );
};


// --- メインコンポーネント ---
const ZthEstimator = () => {
  const [config, setConfig] = useState({
    w: 10, d: 10, nx: 2, ny: 1, px: 12, py: 12, spreadAngle: 45, powerPerChip: 100, subX: 25, subY: 25, baseX: 40, baseY: 40
  });

  const [layers, setLayers] = useState([
    { id: 1, name: "Die Attach", color: "#eab308", material: "Solder_SnAgCu", thickness: 0.1, boundary: 'substrate', optEnabled: false, optMin: 0.05, optMax: 0.2 },
    { id: 2, name: "絶縁基板-Cu", color: "#f97316", material: "Cu", thickness: 0.3, boundary: 'substrate', optEnabled: true, optMin: 0.1, optMax: 1.0 },
    { id: 3, name: "絶縁基板-Iso", color: "#2dd4bf", material: "Si3N4", thickness: 0.3, boundary: 'substrate', optEnabled: false, optMin: 0.1, optMax: 1.0 },
    { id: 4, name: "絶縁基板-Cu", color: "#f97316", material: "Cu", thickness: 0.3, boundary: 'substrate', optEnabled: true, optMin: 0.1, optMax: 1.0 },
    { id: 5, name: "Base Attach", color: "#eab308", material: "Solder_SnAgCu", thickness: 0.2, boundary: 'substrate', optEnabled: false, optMin: 0.05, optMax: 0.3 },
    { id: 6, name: "Cu Base", color: "#3b82f6", material: "Cu", thickness: 3.0, boundary: 'base', optEnabled: true, optMin: 0.5, optMax: 8.0 }
  ]);

  const [chartData, setChartData] = useState([]);
  const [isCalculating, setIsCalculating] = useState(false);
  const [isOptimizing, setIsOptimizing] = useState(false);
  const [optProgress, setOptProgress] = useState(0);
  const [paretoData, setParetoData] = useState([]);
  const [scatterData, setScatterData] = useState([]);
  const [activeTab, setActiveTab] = useState('transient');

  const getEffectiveAreaBase = useCallback((z, boundaryType, currentConfig) => {
    let maxWidth = Infinity; let maxDepth = Infinity;
    if (boundaryType === 'substrate') { maxWidth = currentConfig.subX; maxDepth = currentConfig.subY; }
    else if (boundaryType === 'base') { maxWidth = currentConfig.baseX; maxDepth = currentConfig.baseY; }
    
    const spread = z * Math.tan(currentConfig.spreadAngle * Math.PI / 180);
    const w_eff = Math.min(currentConfig.nx * (currentConfig.w + 2 * spread), (currentConfig.w + 2 * spread) + (currentConfig.nx - 1) * currentConfig.px, maxWidth);
    const d_eff = Math.min(currentConfig.ny * (currentConfig.d + 2 * spread), (currentConfig.d + 2 * spread) + (currentConfig.ny - 1) * currentConfig.py, maxDepth);
    return { area: w_eff * d_eff, w_eff, d_eff };
  }, []);

  const getEffectiveArea = useCallback((z, boundaryType) => getEffectiveAreaBase(z, boundaryType, config), [config, getEffectiveAreaBase]);

  const computedLayers = useMemo(() => {
    let currentZ = 0;
    const chipMat = materialDB["SiC"];
    const chipVol_m3 = (config.w * config.d * 0.35) * 1e-9 * (config.nx * config.ny);
    const chipC = chipMat.rho * chipMat.c * chipVol_m3;
    const chipR = (0.35 * 1e-3) / (chipMat.lambda * config.w * config.d * 1e-6 * config.nx * config.ny);
    
    const calculated = layers.map(layer => {
      const t = Number(layer.thickness);
      const z_in = currentZ; const z_out = currentZ + t;
      const { area: a_in, w_eff: w_in, d_eff: d_in } = getEffectiveArea(z_in, layer.boundary);
      const { area: a_out, w_eff: w_out, d_eff: d_out } = getEffectiveArea(z_out, layer.boundary);
      const a_avg = (a_in + a_out + Math.sqrt(a_in * a_out)) / 3;
      
      const mat = materialDB[layer.material] || materialDB["Cu"];
      const r = (t * 1e-3) / (mat.lambda * a_avg * 1e-6);
      const c = mat.rho * mat.c * (t * 1e-3) * (a_avg * 1e-6);
      
      currentZ += t;
      return { ...layer, r, c, a_in, a_out, w_in, d_in, w_out, d_out, thickness: t };
    });
    
    return [{ id: 0, name: "Chip (Source)", r: chipR, c: chipC, isChip: true }, ...calculated];
  }, [layers, config, getEffectiveArea]);

  const runSimulation = useCallback(() => {
    setIsCalculating(true);
    setTimeout(() => {
      const totalPower = config.powerPerChip * config.nx * config.ny;
      const t_end = 10; const dt = 1e-5;
      const n = computedLayers.length;
      let temps = new Array(n).fill(0);
      const results = [];
      let currentLog = -6; let nextLogTarget = Math.pow(10, currentLog);

      for (let t = 0; t <= t_end; t += dt) {
        if (t >= nextLogTarget || t === 0) {
          results.push({ time: t === 0 ? 1e-7 : t, zth_per_chip: temps[0] / config.powerPerChip });
          currentLog += (1 - (-6)) / 200;
          nextLogTarget = Math.pow(10, currentLog);
        }
        
        const nextTemps = [...temps];
        for (let i = 0; i < n; i++) {
          const r_i = Math.max(computedLayers[i].r, 1e-6);
          const c_i = Math.max(computedLayers[i].c, 1e-6);
          const heatIn = (i === 0) ? totalPower : (temps[i - 1] - temps[i]) / r_i;
          const heatOut = (i === n - 1) ? temps[i] / r_i : (temps[i] - temps[i + 1]) / Math.max(computedLayers[i + 1].r, 1e-6);
          nextTemps[i] += ((heatIn - heatOut) / c_i) * dt;
        }
        temps = nextTemps;
      }
      setChartData(results);
      setIsCalculating(false);
    }, 50);
  }, [computedLayers, config.powerPerChip, config.nx, config.ny]);

  const handleExportCSV = () => {
    if (chartData.length === 0) { alert("計算結果がありません。"); return; }
    let header = ["Chip_W", "Chip_D", "Nx", "Ny", "PitchX", "PitchY", "SpreadAngle", "PowerPerChip", "Sub_X", "Sub_Y", "Base_X", "Base_Y"];
    layers.forEach((l, i) => { header.push(`L${i+1}_Name`, `L${i+1}_Mat`, `L${i+1}_Thick`); });
    chartData.forEach((d, i) => header.push(`Zth_t${d.time.toExponential(2)}`));
    
    let row = [config.w, config.d, config.nx, config.ny, config.px, config.py, config.spreadAngle, config.powerPerChip, config.subX, config.subY, config.baseX, config.baseY];
    layers.forEach(l => { row.push(l.name, l.material, l.thickness); });
    chartData.forEach(d => row.push(d.zth_per_chip.toFixed(6)));
    
    const csvContent = "data:text/csv;charset=utf-8," + header.join(",") + "\n" + row.join(",");
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `zth_result_${new Date().toISOString().slice(0,19).replace(/[-T:]/g,"")}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  const startParetoSearch = () => {
    setIsOptimizing(true);
    setActiveTab('pareto');
    setOptProgress(0);
    
    const optTargets = layers.filter(l => l.optEnabled);
    if (optTargets.length === 0) {
      alert("最適化対象の層がありません。「探索対象」のチェックを入れてください");
      setIsOptimizing(false);
      return;
    }
    
    const SAMPLES = 3000;
    const CHUNK_SIZE = 500;
    let currentSample = 0;
    const allResults = [];
    
    const evaluateObjectives = (genes) => {
      let currentZ = 0; let totalR = 0; let totalThickness = 0;
      const chipMat = materialDB["SiC"];
      const chipR = (0.35 * 1e-3) / (chipMat.lambda * config.w * config.d * 1e-6 * config.nx * config.ny);
      totalR += chipR;
      
      for (let i = 0; i < layers.length; i++) {
        const layer = layers[i];
        const t = layer.optEnabled ? genes[layer.id] : Number(layer.thickness);
        if (t <= 0) continue;
        
        totalThickness += t;
        const z_in = currentZ; const z_out = currentZ + t;
        const { area: a_in } = getEffectiveAreaBase(z_in, layer.boundary, config);
        const { area: a_out } = getEffectiveAreaBase(z_out, layer.boundary, config);
        const a_avg = (a_in + a_out + Math.sqrt(a_in * a_out)) / 3;
        
        const mat = materialDB[layer.material] || materialDB["Cu"];
        const r = (t * 1e-3) / (mat.lambda * a_avg * 1e-6);
        totalR += r;
        currentZ += t;
      }
      return { rth: totalR * (config.nx * config.ny), thickness: totalThickness };
    };

    const processChunk = () => {
      const endSample = Math.min(currentSample + CHUNK_SIZE, SAMPLES);
      for (let i = currentSample; i < endSample; i++) {
        const genes = {};
        optTargets.forEach(l => {
          const min = Number(l.optMin) || 0.05;
          const max = Number(l.optMax) || 5.0;
          genes[l.id] = min + Math.random() * (max - min);
        });
        const { rth, thickness } = evaluateObjectives(genes);
        allResults.push({ id: i, rth, thickness, genes });
      }
      currentSample = endSample;
      setOptProgress(Math.round((currentSample / SAMPLES) * 100));
      
      if (currentSample < SAMPLES) {
        setTimeout(processChunk, 10);
      } else {
        const paretoFront = [];
        allResults.sort((a, b) => a.thickness - b.thickness);
        let minRthSoFar = Infinity;
        for (let i = 0; i < allResults.length; i++) {
          const p = allResults[i];
          if (p.rth < minRthSoFar) {
            paretoFront.push(p);
            minRthSoFar = p.rth;
          }
        }
        setScatterData(allResults.filter(p => !paretoFront.includes(p)));
        setParetoData(paretoFront);
        setIsOptimizing(false);
      }
    };
    processChunk();
  };

  const applyGenes = (genes) => {
    const newLayers = layers.map(l => {
      if (genes[l.id] !== undefined) {
        return { ...l, thickness: Number(genes[l.id].toFixed(3)) };
      }
      return l;
    });
    setLayers(newLayers);
    setActiveTab('transient');
    setTimeout(() => runSimulation(), 50);
  };
